spring.application.name=funcionario

# Configurações do banco H2 (banco em memória para desenvolvimento)
spring.datasource.url=jdbc:h2:mem:rhdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# update: cria/atualiza a tabela automaticamente |
# create:Recria do zero toda vez que rodar |
# none: Não mexe no banco (usado em produção)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console do H2 (interface visual do banco no navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
